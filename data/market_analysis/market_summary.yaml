project:
  name: Saudi AI Career Intelligence
  target_user: Saudi CS/AI students and fresh graduates
  dataset_version: initial_72_job_postings
  source_dataset: data/job_postings/processed/job_postings.csv
  generated_outputs:
    - data/market_analysis/role_category_breakdown.csv
    - data/market_analysis/sector_breakdown.csv
    - data/market_analysis/skills_tools_frequency.csv
    - data/market_analysis/company_frequency.csv
    - data/market_analysis/experience_breakdown.csv

dataset_summary:
  total_job_postings: 72
  caveat: >
    This is a personal application-history dataset, not a complete Saudi labor-market sample.
    It is still useful because it reflects roles the student is actively targeting.

